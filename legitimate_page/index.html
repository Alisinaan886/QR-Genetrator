<!DOCTYPE html>
<html>
<head>
    <title>Secure Login - Legitimate Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        .legitimate-badge {
            background: #10b981;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        h2 { color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .security-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="legitimate-badge">✓ LEGITIMATE SITE</div>
        <h2>Secure Login</h2>
        <form onsubmit="handleLegitimateLogin(event)">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="security-info">
            <strong>Security Indicators:</strong><br>
            ✓ HTTPS connection (check URL bar)<br>
            ✓ Valid SSL certificate<br>
            ✓ Correct domain name<br>
            ✓ No spelling errors
        </div>
    </div>
    <script>
        function handleLegitimateLogin(e) {
            e.preventDefault();
            alert('This is the LEGITIMATE page.\n\nIn a real scenario, this would securely process your credentials.');
        }
    </script>
</body>
</html>
